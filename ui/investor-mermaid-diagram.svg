<svg width="1800" height="1080" viewBox="0 0 1800 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="170" y1="64" x2="1644" y2="1034" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#F1E5D2"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C4512D"/>
      <stop offset="1" stop-color="#D9A329"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#27A296"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#5A4028" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowAccent" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13V1Z" fill="#C4512D"/>
    </marker>
    <marker id="arrowGold" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13V1Z" fill="#D9A329"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13V1Z" fill="#0F766E"/>
    </marker>
    <style>
      .eyebrow { font: 700 22px Arial, Helvetica, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; }
      .title { font: 700 78px Arial, Helvetica, sans-serif; letter-spacing: -0.04em; fill: #1D1A17; }
      .subtitle { font: 400 30px Arial, Helvetica, sans-serif; fill: #6C5E52; }
      .card-title { font: 700 30px Arial, Helvetica, sans-serif; fill: #1D1A17; }
      .card-copy { font: 400 21px Arial, Helvetica, sans-serif; fill: #6C5E52; }
      .pill { font: 700 18px Arial, Helvetica, sans-serif; }
      .metric-big { font: 700 54px Arial, Helvetica, sans-serif; fill: #1D1A17; }
      .metric-copy { font: 400 19px Arial, Helvetica, sans-serif; fill: #6C5E52; }
      .footer { font: 400 24px Arial, Helvetica, sans-serif; fill: #6C5E52; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1800" height="1080" fill="url(#bg)"/>
  <circle cx="1590" cy="-10" r="220" fill="#D9A329" fill-opacity="0.18"/>
  <circle cx="1510" cy="-24" r="140" fill="#0F766E" fill-opacity="0.16"/>
  <circle cx="56" cy="128" r="170" fill="#C4512D" fill-opacity="0.12"/>
  <circle cx="1706" cy="992" r="180" fill="#0F766E" fill-opacity="0.08"/>

  <text x="120" y="92" class="eyebrow" fill="#C4512D">JIT Talent AI</text>
  <text x="120" y="178" class="title">Recruiting Workflow Diagram</text>
  <text x="120" y="228" class="subtitle">Investor view: one Slack-triggered workflow that expands search, scores fit, and activates outreach.</text>

  <g filter="url(#shadow)">
    <rect x="96" y="296" width="290" height="144" rx="28" fill="#FFF9F3" stroke="#E2B6A7" stroke-width="2"/>
    <rect x="432" y="296" width="330" height="144" rx="28" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>
    <rect x="810" y="296" width="330" height="144" rx="28" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>
    <rect x="1188" y="296" width="362" height="144" rx="28" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>

    <rect x="502" y="534" width="466" height="172" rx="30" fill="#EDF8F6" stroke="#A8D8D2" stroke-width="2"/>
    <rect x="1112" y="534" width="438" height="172" rx="30" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>

    <rect x="286" y="788" width="352" height="154" rx="30" fill="#FFF4ED" stroke="#E2B6A7" stroke-width="2"/>
    <rect x="720" y="788" width="372" height="154" rx="30" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>
    <rect x="1170" y="772" width="386" height="186" rx="32" fill="#EDF8F6" stroke="#A8D8D2" stroke-width="2"/>

    <rect x="96" y="534" width="334" height="200" rx="30" fill="#FFF9F3" stroke="#E6D8C7" stroke-width="2"/>
    <rect x="96" y="788" width="154" height="154" rx="28" fill="#FFF4ED" stroke="#E2B6A7" stroke-width="2"/>
  </g>

  <g>
    <rect x="120" y="274" width="82" height="36" rx="18" fill="#FFF9F3" stroke="#E2B6A7"/>
    <text x="161" y="298" text-anchor="middle" class="pill" fill="#C4512D">Input</text>

    <rect x="456" y="274" width="122" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="517" y="298" text-anchor="middle" class="pill" fill="#C4512D">Discovery</text>

    <rect x="834" y="274" width="84" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="876" y="298" text-anchor="middle" class="pill" fill="#C4512D">Search</text>

    <rect x="1212" y="274" width="72" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="1248" y="298" text-anchor="middle" class="pill" fill="#C4512D">Output</text>

    <rect x="526" y="510" width="136" height="36" rx="18" fill="#EDF8F6" stroke="#A8D8D2"/>
    <text x="594" y="534" text-anchor="middle" class="pill" fill="#0F766E">AI Scoring</text>

    <rect x="1118" y="510" width="118" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="1177" y="534" text-anchor="middle" class="pill" fill="#D9A329">Review</text>

    <rect x="310" y="764" width="120" height="36" rx="18" fill="#FFF4ED" stroke="#E2B6A7"/>
    <text x="370" y="788" text-anchor="middle" class="pill" fill="#C4512D">Decision</text>

    <rect x="742" y="764" width="136" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="810" y="788" text-anchor="middle" class="pill" fill="#C4512D">Enrichment</text>

    <rect x="1196" y="748" width="134" height="36" rx="18" fill="#EDF8F6" stroke="#A8D8D2"/>
    <text x="1263" y="772" text-anchor="middle" class="pill" fill="#0F766E">Activation</text>

    <rect x="120" y="510" width="108" height="36" rx="18" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="174" y="534" text-anchor="middle" class="pill" fill="#C4512D">Weights</text>

    <rect x="120" y="764" width="88" height="36" rx="18" fill="#FFF4ED" stroke="#E2B6A7"/>
    <text x="164" y="788" text-anchor="middle" class="pill" fill="#C4512D">Metric</text>
  </g>

  <g>
    <text x="124" y="354" class="card-title">Slack job post</text>
    <text x="124" y="392" class="card-copy">Recruiter posts a JD in Slack</text>
    <text x="124" y="422" class="card-copy">to trigger the workflow.</text>

    <text x="460" y="354" class="card-title">Search expansion</text>
    <text x="460" y="392" class="card-copy">The role is widened into 6 search angles</text>
    <text x="460" y="422" class="card-copy">and 60 search variations.</text>

    <text x="838" y="354" class="card-title">Candidate scan</text>
    <text x="838" y="392" class="card-copy">Up to ~6,000 raw profile results can be</text>
    <text x="838" y="422" class="card-copy">be reviewed per role before cleanup.</text>

    <text x="1216" y="354" class="card-title">Ranked candidate sheet</text>
    <text x="1216" y="392" class="card-copy">Results are delivered back as a Google Sheet</text>
    <text x="1216" y="422" class="card-copy">linked in Slack for recruiter review.</text>

    <text x="530" y="602" class="card-title">AI scoring</text>
    <text x="530" y="640" class="card-copy">Candidates are deduplicated and scored from 0 to 10</text>
    <text x="530" y="670" class="card-copy">using weighted fit criteria, written reasoning,</text>
    <text x="530" y="700" class="card-copy">and outreach-ready personalization snippets.</text>

    <text x="1140" y="602" class="card-title">Recruiter review</text>
    <text x="1140" y="640" class="card-copy">The team reviews the ranked list in Slack</text>
    <text x="1140" y="670" class="card-copy">and decides which score band should move</text>
    <text x="1140" y="700" class="card-copy">directly into outreach.</text>

    <text x="314" y="856" class="card-title">Threshold reply</text>
    <text x="314" y="894" class="card-copy">Recruiter replies with a minimum score</text>
    <text x="314" y="924" class="card-copy">such as 5 to approve outreach.</text>

    <text x="748" y="856" class="card-title">Email verification</text>
    <text x="748" y="894" class="card-copy">Direct emails are found, filtered, and checked</text>
    <text x="748" y="924" class="card-copy">for deliverability before activation.</text>

    <text x="1198" y="846" class="card-title">AI-personalized</text>
    <text x="1198" y="882" class="card-title">campaign per lead</text>
    <text x="1198" y="926" class="card-copy">Each approved lead is enrolled with</text>
    <text x="1198" y="956" class="card-copy">personalized outbound messaging.</text>

    <text x="124" y="602" class="card-title">Scoring model factors</text>
    <text x="124" y="640" class="card-copy">Skills and tools fit 35%</text>
    <text x="124" y="670" class="card-copy">Relevant experience 35%</text>
    <text x="124" y="700" class="card-copy">Responsibilities overlap 15%</text>
    <text x="124" y="730" class="card-copy">Seniority and leadership fit 10%</text>
    <text x="124" y="760" class="card-copy">Logistics fit 5%</text>

    <text x="122" y="856" class="metric-big">60</text>
    <text x="122" y="894" class="metric-copy">Total search</text>
    <text x="122" y="922" class="metric-copy">variations</text>
  </g>

  <g>
    <path d="M386 368H432" stroke="#C4512D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAccent)"/>
    <path d="M762 368H810" stroke="#C4512D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAccent)"/>
    <path d="M1140 368H1188" stroke="#D9A329" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGold)"/>

    <path d="M974 440V522" stroke="#0F766E" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <path d="M1328 440V522" stroke="#D9A329" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <path d="M968 620H1112" stroke="#D9A329" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGold)"/>

    <path d="M660 706L736 788" stroke="#C4512D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAccent)"/>
    <path d="M638 866H720" stroke="#C4512D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowAccent)"/>
    <path d="M1092 866H1170" stroke="#0F766E" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  </g>

  <g>
    <rect x="554" y="346" width="104" height="34" rx="17" fill="#FFF4ED" stroke="#E2B6A7"/>
    <text x="606" y="368" text-anchor="middle" class="label" fill="#C4512D">Trigger</text>

    <rect x="930" y="346" width="86" height="34" rx="17" fill="#FFF4ED" stroke="#E2B6A7"/>
    <text x="973" y="368" text-anchor="middle" class="label" fill="#C4512D">Search</text>

    <rect x="1300" y="346" width="88" height="34" rx="17" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="1344" y="368" text-anchor="middle" class="label" fill="#D9A329">Review</text>

    <rect x="924" y="476" width="98" height="34" rx="17" fill="#EDF8F6" stroke="#A8D8D2"/>
    <text x="973" y="498" text-anchor="middle" class="label" fill="#0F766E">Qualify</text>

    <rect x="1290" y="476" width="82" height="34" rx="17" fill="#FFF9F3" stroke="#E6D8C7"/>
    <text x="1331" y="498" text-anchor="middle" class="label" fill="#D9A329">Choose</text>

    <rect x="650" y="842" width="96" height="34" rx="17" fill="#FFF4ED" stroke="#E2B6A7"/>
    <text x="698" y="864" text-anchor="middle" class="label" fill="#C4512D">Approve</text>

    <rect x="1098" y="842" width="100" height="34" rx="17" fill="#EDF8F6" stroke="#A8D8D2"/>
    <text x="1148" y="864" text-anchor="middle" class="label" fill="#0F766E">Activate</text>
  </g>

  <g>
    <text x="120" y="1010" class="footer">Slack trigger → search expansion → candidate scan → AI scoring → ranked sheet → threshold reply → verified outreach</text>
  </g>
</svg>
